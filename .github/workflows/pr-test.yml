name: PR Test

on:
  # Push to main triggers ONLY the cpu jobs (cheap GitHub-hosted runner) — see
  # the per-job `if:` below, which adds `push` only for cpu configs. GPU jobs
  # stay PR/label-gated so push events never burn the self-hosted fleet. This
  # catches PR-pair regressions where two PRs pass individually but main breaks
  # after both land.
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [synchronize, labeled]
  workflow_dispatch:
    inputs:
      infinite_run:
        description: 'Run training infinitely'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  pre-commit:
    name: Run pre-commit (gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure --color=always


  e2e-test-short:
    needs: pre-commit

    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-short'))


    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        info: [{"num_gpus": 4, "test_file": "test_qwen3.5_0.8B_gsm8k_async_short.py"}, {"num_gpus": 4, "test_file": "test_qwen3.5_0.8B_gsm8k_short.py"}, {"num_gpus": 4, "test_file": "test_qwen2.5_0.5B_ppo_critic_only_short.py"}, {"num_gpus": 4, "test_file": "test_qwen2.5_0.5B_fully_async_short.py"}]
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      GITHUB_COMMIT_NAME: ${{ github.sha }}_${{ github.event.pull_request.number || 'non-pr' }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      VIME_TEST_ENABLE_INFINITE_RUN: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.infinite_run) || 'false' }}
      VIME_TEST_USE_DEEPEP: ${{ matrix.info.use_deepep || '0' }}
      VIME_TEST_USE_FP8_ROLLOUT: ${{ matrix.info.use_fp8_rollout || '0' }}
      VIME_TEST_ENABLE_EVAL: ${{ matrix.info.enable_eval || '1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Execute
        shell: bash
        run: |

          docker run --rm \
            --privileged \
            --cap-add SYS_NICE \
            --security-opt seccomp=unconfined \
            --network host \
            --gpus all \
            --ipc=host \
            --shm-size=16g \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --memory=0 \
            --memory-swap=0 \
            -e http_proxy \
            -e https_proxy \
            -e HTTP_PROXY \
            -e HTTPS_PROXY \
            -e GITHUB_COMMIT_NAME \
            -e WANDB_API_KEY \
            -e VIME_TEST_ENABLE_INFINITE_RUN \
            -e VIME_TEST_USE_DEEPEP \
            -e VIME_TEST_USE_FP8_ROLLOUT \
            -e VIME_TEST_ENABLE_EVAL \
            -e TEST_FILE="${{ matrix.info.test_file }}" \
            -e TEST_ARGS="${{ matrix.info.test_args || '' }}" \
            -e NUM_GPUS="${{ matrix.info.num_gpus }}" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -v /mnt/nvme0n1/vime_ci:/data/vime_ci \
            -v /mnt/nvme0n1/vime_ci/models:/root/models \
            -v /mnt/nvme0n1/vime_ci/datasets:/root/datasets \
            -w "$GITHUB_WORKSPACE" \
            inferactinc/public:vime-latest \
            bash -lc '
              set -euo pipefail
              pip install -e . --no-deps --break-system-packages
              TEST_PATH="$TEST_FILE"
              if [[ "$TEST_PATH" != tests/* ]]; then
                TEST_PATH="tests/$TEST_PATH"
              fi
              if [[ -n "$TEST_ARGS" ]]; then
                read -r -a TEST_ARGS_ARRAY < <(printf "%s\n" "$TEST_ARGS")
              else
                TEST_ARGS_ARRAY=()
              fi
              if [ "$NUM_GPUS" = "0" ]; then
                python "$TEST_PATH" "${TEST_ARGS_ARRAY[@]}"
              else
                python tests/ci/gpu_lock_exec.py --count "$NUM_GPUS" -- python "$TEST_PATH" "${TEST_ARGS_ARRAY[@]}"
              fi
            '


